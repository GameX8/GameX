  padding: 15px;

.container {

button {

  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<header>🎮 GameX</header>

<div class="container">

  <div class="card">
    <h3>🚗 Drive Mad</h3>
    <a href="https://www.onlinegames.io/games/2023/unity2/drive-mad/index.html" target="_blank">
      <button>🎮 العب الآن</button>

  </div>

  <div class="card">
    <h3>🏎️ Car Rush</h3>
    <a href="https://www.onlinegames.io/games/2022/unity/car-rush/index.html" target="_blank">

    </a>
  </div>

</div>

</body>
</html>
